<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category | C Celluloids</title>
  <meta name="description" content="Browse projects inside a selected C Celluloids category." />
  <meta name="theme-color" content="#f7f7f2" />
  <meta property="og:title" content="Category | C Celluloids" />
  <meta property="og:description" content="Open a category and browse its projects." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.ccelluloids.in/category.html" />
  <link rel="canonical" href="https://www.ccelluloids.in/category.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700;6..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-category">
  <button class="universal-back" type="button" data-fallback="gallery.html" aria-label="Go back">
    <span aria-hidden="true">←</span>
    <span>Back</span>
  </button>
  <main>
    <section class="section projects-section" id="projectsSection">
      <div class="container">
        <div class="category-mini-head reveal">
          <p class="eyebrow" id="categoryEyebrow">Category</p>
          <h1 id="projectListTitle">Selected Category</h1>
        </div>
        <div class="project-card-grid" id="projectCardGrid"></div>
      </div>
    </section>
  </main>

  <section class="project-story" id="projectStory" aria-hidden="true">
    <div class="project-story-scroll">
      <header class="project-story-top">
        <h2 class="story-sticky-title"></h2>
      </header>
      <section class="project-story-hero">
        <div class="story-hero-pin">
          <img class="story-cover" src="" alt="" />
          <div class="story-cover-dark"></div>
          <div class="story-detail-overlay">
            <h1 class="story-title"></h1>
            <div class="story-info-block">
              <div class="story-meta"></div>
              <p class="story-description"></p>
            </div>
          </div>
        </div>
      </section>
      <section class="project-story-gallery">
        <div class="story-gallery-head"><h3 class="story-gallery-title"></h3></div>
        <div class="story-masonry"></div>
      </section>
    </div>
  </section>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Gallery preview">
    <button class="lightbox-close" type="button" aria-label="Close preview">×</button>
    <button class="lightbox-prev" type="button" aria-label="Previous item">‹</button>
    <div class="lightbox-stage"></div>
    <button class="lightbox-next" type="button" aria-label="Next item">›</button>
    <div class="lightbox-meta"><h3></h3><p></p></div>
  </div>

  <footer class="site-footer">
    <div class="footer-brand"><img src="Black-logo.png" alt="C Celluloids logo" width="180" height="64" /><p>Bangalore, India. Available across India.</p></div>
    <div class="footer-contact">
      <a class="icon-link" href="mailto:admin@ccelluloids.in"><img class="ui-icon" src="assets/icons/email.svg" alt="" aria-hidden="true" /><span>Email</span></a>
    </div>
    <div class="footer-social">
      <a class="icon-link" href="https://www.instagram.com/c_celluloids/" target="_blank" rel="noopener noreferrer"><img class="ui-icon" src="assets/icons/instagram.svg" alt="" aria-hidden="true" /><span>Instagram</span></a>
      <a class="icon-link" href="https://www.youtube.com/@ccelluloids" target="_blank" rel="noopener noreferrer"><img class="ui-icon" src="assets/icons/youtube.svg" alt="" aria-hidden="true" /><span>YouTube</span></a>
    </div>
  </footer>

  <a href="#" class="scroll-top" aria-label="Scroll to top">↑</a>
  <nav class="dock-nav" aria-label="Primary Navigation">
    <span class="nav-emblem" aria-hidden="true"><img src="signature.png" alt="" /></span>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="about.html">About</a>
    <a href="hireme.html">Hire Me</a>
  </nav>
  <script src="main.js" defer></script>
</body>
</html>
