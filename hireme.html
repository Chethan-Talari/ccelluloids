<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hire / Contact | C Celluloids</title>
  <meta name="description" content="Contact C Celluloids to book photography, films, and creative production. Fast inquiry form with project type, budget, and schedule." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="brand-mark"><img src="white-logo.png" alt="C Celluloids logo" width="130" height="48" /></a>
    <button class="burger" aria-label="Open navigation" aria-expanded="false"><span></span><span></span><span></span></button>
    <nav class="site-nav">
      <a href="index.html">Home</a><a href="gallery.html">Gallery</a><a href="services.html">Services</a><a href="about.html">About</a><a href="hireme.html" class="btn btn-small">Book Shoot</a>
    </nav>
  </header>
  <main class="page">
    <section class="page-head reveal"><p class="eyebrow">Contact</p><h1>Let's create your next high-impact visual story.</h1><p>Share details below. I reply within 24 hours.</p></section>
    <section class="contact-wrap reveal">
      <form class="contact-form" action="https://usebasin.com/f/a3dfc92aa5f2" method="POST">
        <input type="hidden" name="redirect" value="thankyou.html" />
        <label>Name<input type="text" name="name" required /></label>
        <label>Email / Phone<input type="text" name="contact" required /></label>
        <label>Project Type
          <select name="project_type" required>
            <option value="">Select</option><option>Photography</option><option>Brand Shoot</option><option>Product Shoot</option><option>Event Coverage</option><option>Documentary Film</option><option>Video Editing</option>
          </select>
        </label>
        <label>Budget Range
          <select name="budget_range" required>
            <option value="">Select</option><option>₹25k - ₹50k</option><option>₹50k - ₹1L</option><option>₹1L - ₹3L</option><option>₹3L+</option>
          </select>
        </label>
        <label>Event / Shoot Date<input type="date" name="event_date" /></label>
        <label>Project Brief<textarea name="message" rows="5" required></textarea></label>
        <button type="submit" class="btn">Send Inquiry</button>
      </form>
      <aside class="contact-side">
        <h3>Quick Contact</h3>
        <p><strong>Email:</strong> admin@ccelluloids.in</p>
        <p><strong>Phone:</strong> +91 810 6543 475</p>
        <a class="btn btn-ghost" href="https://wa.me/918106543475" target="_blank" rel="noopener">WhatsApp Now</a>
        <div class="socials"><a href="#">Instagram</a><a href="#">Behance</a><a href="#">Facebook</a></div>
      </aside>
    </section>
  </main>
  <footer class="site-footer"><p>C Celluloids • Built for stories that sell.</p></footer>
  <script src="main.js" defer></script>
</body>
</html>
