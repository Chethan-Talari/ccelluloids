<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | C Celluloids</title>
  <meta name="description" content="Explore C Celluloids gallery featuring cinematic photography, films, and event highlights." />
  <meta name="theme-color" content="#0b0d12" />
  <meta property="og:title" content="Gallery | C Celluloids" />
  <meta property="og:description" content="A curated gallery of photos and videos by C Celluloids." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.ccelluloids.in/gallery.html" />
  <link rel="canonical" href="https://www.ccelluloids.in/gallery.html" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-gallery">
  <div id="preloader">
    <img src="white-logo.png" alt="Loading C Celluloids" width="120" height="45" />
  </div>

  <header class="navbar">
    <div class="logo">
      <a href="index.html"><img src="white-logo.png" class="logo" alt="C Celluloids logo" width="130" height="48" /></a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="hireme.html" class="hireme-nav-btn">Hire Me</a></li>
      </ul>
    </nav>
    <div class="burger">
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </div>
  </header>

  <main>
    <h1 class="section-title">Gallery</h1>
    <div class="gallery-grid">
      <img src="photo1.jpg" alt="Gallery Photo 1" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo2.jpg" alt="Gallery Photo 2" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo3.jpg" alt="Gallery Photo 3" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo4.jpg" alt="Gallery Photo 4" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo5.jpg" alt="Gallery Photo 5" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo6.jpg" alt="Gallery Photo 6" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo7.jpg" alt="Gallery Photo 7" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photo8.jpg" alt="Gallery Photo 8" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photoA.jpg" alt="Gallery Photo 9" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photoB.JPG" alt="Gallery Photo 10" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photoC.JPG" alt="Gallery Photo 11" class="gallery-item" loading="lazy" decoding="async" />
      <img src="photoD.JPG" alt="Gallery Photo 12" class="gallery-item" loading="lazy" decoding="async" />

      <video src="vid1.mp4" class="gallery-item" muted playsinline controls preload="none"></video>
      <video src="vid2.mp4" class="gallery-item" muted playsinline controls preload="none"></video>
      <video src="vid3.mp4" class="gallery-item" muted playsinline controls preload="none"></video>
      <video src="vid4.mp4" class="gallery-item" muted playsinline controls preload="none"></video>
    </div>

    <div class="gallery-cta">
      <a href="about.html" class="btn">Know More About Me</a>
    </div>

    <div id="lightboxModal" class="lightbox-modal">
      <div class="lightbox-backdrop"></div>
      <span class="lightbox-close" tabindex="0">&times;</span>
      <div class="lightbox-content"></div>
    </div>
  </main>

  <footer>
    <div class="footer-left">Contact: admin@ccelluloids.in | Phone: +91 810 6543 475</div>
    <div class="footer-right">
      <img src="white-logo.png" width="100" height="37" alt="C Celluloids logo" loading="lazy" decoding="async" />
    </div>
  </footer>

  <div class="custom-cursor"></div>
  <a href="#" class="scroll-top" aria-label="Scroll to top">&uarr;</a>
  <script src="main.js" defer></script>
</body>
</html>
